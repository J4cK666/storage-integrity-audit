<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计工作台 - 管理员</title>
    <link rel="icon" type="image/png" href="../../assets/logo/logo.png">
    <link rel="stylesheet" href="./admin.css?v=2026051712">
    <script src="./admin.js?v=2026051712" defer></script>
</head>
<body>
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-head">
                <img class="brand-logo" src="../../assets/logo/logo.png" alt="logo">
                <div>
                    <strong>管理后台</strong>
                    <span>Admin Console</span>
                </div>
            </div>

            <nav class="admin-nav" aria-label="管理员导航">
                <button class="admin-nav-item active" type="button" data-admin-tab="users">
                    <span>用户列表</span>
                </button>
                <button class="admin-nav-item" type="button" data-admin-tab="files">
                    <span>文件列表</span>
                </button>
                <button class="admin-nav-item" type="button" data-admin-tab="records">
                    <span>审计列表</span>
                </button>
            </nav>

            <button class="admin-logout" id="adminLogout" type="button">退出登录</button>
        </aside>

        <main class="admin-workspace">
            <header class="admin-topbar">
                <div>
                    <p class="topbar-kicker">Read Only</p>
                    <h1 id="adminPageTitle">用户列表</h1>
                </div>
                <div class="topbar-status"><span></span><strong>Admin</strong></div>
            </header>

            <section class="admin-tab-panel active" data-admin-panel="users">
                <div class="summary-grid">
                    <article class="summary-card">
                        <span>用户数量</span>
                        <strong id="adminUserCount">0</strong>
                    </article>
                </div>

                <section class="panel">
                    <div class="panel-head">
                        <div>
                            <p class="panel-kicker">Users</p>
                            <h2>用户列表</h2>
                        </div>
                        <button class="soft-button" id="refreshUsersButton" type="button">刷新</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>用户 ID</th>
                                </tr>
                            </thead>
                            <tbody id="adminUserTableBody">
                                <tr class="empty-row"><td colspan="2">正在读取用户...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </section>

            <section class="admin-tab-panel" data-admin-panel="files">
                <section class="panel">
                    <div class="panel-head">
                        <div>
                            <p class="panel-kicker">Files</p>
                            <h2>文件列表</h2>
                        </div>
                    </div>
                    <form class="admin-query-form" id="fileQueryForm">
                        <label for="fileUserIdInput">用户 ID</label>
                        <div class="admin-query-row">
                            <input id="fileUserIdInput" type="text" placeholder="请输入用户 ID">
                            <button class="primary-button" type="submit">查询文件</button>
                        </div>
                    </form>
                    <div class="summary-grid compact-summary">
                        <article class="summary-card">
                            <span>当前用户 ID</span>
                            <strong id="fileSelectedUserId">--</strong>
                        </article>
                        <article class="summary-card">
                            <span>文件记录</span>
                            <strong id="selectedFileCount">0</strong>
                        </article>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>文件 ID</th>
                                    <th>文件状态</th>
                                    <th>审计时间</th>
                                </tr>
                            </thead>
                            <tbody id="adminFileTableBody">
                                <tr class="empty-row"><td colspan="3">请输入用户 ID 后查询</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </section>

            <section class="admin-tab-panel" data-admin-panel="records">
                <section class="panel">
                    <div class="panel-head">
                        <div>
                            <p class="panel-kicker">Audit</p>
                            <h2>审计列表</h2>
                        </div>
                    </div>
                    <form class="admin-query-form" id="recordQueryForm">
                        <label for="recordUserIdInput">用户 ID</label>
                        <div class="admin-query-row">
                            <input id="recordUserIdInput" type="text" placeholder="请输入用户 ID">
                            <button class="primary-button" type="submit">查询审计</button>
                        </div>
                    </form>
                    <div class="summary-grid compact-summary">
                        <article class="summary-card">
                            <span>当前用户 ID</span>
                            <strong id="recordSelectedUserId">--</strong>
                        </article>
                        <article class="summary-card accent-card">
                            <span>审计记录</span>
                            <strong id="selectedRecordCount">0</strong>
                        </article>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>审计 ID</th>
                                    <th>审计状态</th>
                                    <th>审计时间</th>
                                </tr>
                            </thead>
                            <tbody id="adminRecordTableBody">
                                <tr class="empty-row"><td colspan="3">请输入用户 ID 后查询</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </section>
        </main>
    </div>
</body>
</html>
