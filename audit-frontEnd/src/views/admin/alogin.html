<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="icon" type="image/png" href="../../assets/logo/logo.png">
    <link rel="stylesheet" href="./alogin.css?v=2026051711">
    <script src="./alogin.js?v=2026051711" defer></script>
</head>
<body>
    <main class="login-page">
        <form class="login-panel" id="adminLoginForm">
            <img class="login-logo" src="../../assets/logo/logo.png" alt="logo">
            <h1>管理员登录</h1>
            <label>
                <span>用户名</span>
                <input id="adminUsername" type="text" autocomplete="username" placeholder="请输入用户名" required>
            </label>
            <label>
                <span>密码</span>
                <input id="adminPassword" type="password" autocomplete="current-password" placeholder="请输入密码" required>
            </label>
            <button type="submit" id="adminLoginButton">登录</button>
            <p class="login-message" id="adminLoginMessage"></p>
        </form>
    </main>
</body>
</html>
