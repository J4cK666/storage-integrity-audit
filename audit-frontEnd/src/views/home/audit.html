<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计工作台 - 文件审计</title>
    <link rel="icon" type="image/png" href="../../assets/logo/logo.png">
    <script src="./shell-preload.js"></script>
    <link rel="stylesheet" href="./home.css?v=2026051706">
    <script src="./common.js?v=2026051706" defer></script>
    <script src="./audit.js?v=2026051706" defer></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <img class="brand-logo" src="../../assets/logo/logo.png" alt="logo">
                <div class="brand-text"><strong>存储完整性审计</strong><span>Keyword Audit</span></div>
            </div>
            <nav class="side-nav" aria-label="主导航">
                <a class="nav-item" href="./home.html" data-page="dashboard"><span class="nav-icon">⌂</span><span class="nav-label">首页</span></a>
                <a class="nav-item" href="./upload.html" data-page="upload"><span class="nav-icon">↑</span><span class="nav-label">上传文件</span></a>
                <a class="nav-item active" href="./audit.html" data-page="audit"><span class="nav-icon">◎</span><span class="nav-label">文件审计</span></a>
                <a class="nav-item" href="./records.html" data-page="records"><span class="nav-icon">≡</span><span class="nav-label">审计记录</span></a>
            </nav>
            <div class="account-area">
                <button class="account-button" id="accountButton" type="button">
                    <span class="avatar">U</span>
                    <span class="account-copy"><strong>审计用户</strong><span>user@audit.local</span></span>
                </button>
                <div class="account-menu" id="accountMenu">
                    <a href="./profile.html">用户信息</a>
                    <a href="../login/login.html" data-logout>退出登录</a>
                </div>
            </div>
        </aside>

        <main class="workspace">
            <header class="topbar">
                <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="隐藏或显示导航栏">☰</button>
                <div>
                    <p class="topbar-kicker">Secure Workspace</p>
                    <h1 id="pageTitle">文件审计</h1>
                </div>
                <div class="topbar-status"><span></span><strong>Proof Verify Ready</strong></div>
            </header>

            <section class="view active">
                <section class="panel audit-panel">
                    <div class="panel-head">
                        <div>
                            <p class="panel-kicker">Audit</p>
                            <h2>文件审计</h2>
                        </div>
                    </div>
                    <div class="audit-form" id="auditForm">
                        <div class="audit-input-row">
                            <div class="audit-field">
                                <label for="auditKeyword">关键词</label>
                                <input id="auditKeyword" type="text" placeholder="例如：file、contract、report">
                            </div>
                            <div class="audit-field audit-block-field">
                                <label for="auditBlockCount">审计块数</label>
                                <input id="auditBlockCount" type="number" min="1" step="1" disabled>
                                <span id="auditBlockHint" class="field-hint">正在读取安全索引...</span>
                            </div>
                            <button class="primary-button" id="runAuditButton" type="button">开始审计</button>
                        </div>
                    </div>
                    <div class="audit-result" id="auditResult">
                        <div><span>文件数</span><strong>0</strong></div>
                        <div><span>审计块数</span><strong>--</strong></div>
                        <div><span>审计结果</span><strong>等待关键词</strong></div>
                        <div><span>审计用时</span><strong>--</strong></div>
                    </div>
                    <div class="table-wrap audit-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>文件名 / ID</th>
                                    <th>关键词</th>
                                    <th>审计结果</th>
                                    <th>用时</th>
                                </tr>
                            </thead>
                            <tbody id="auditResultBody"></tbody>
                        </table>
                    </div>
                </section>
            </section>
        </main>
    </div>
    <script>
        (() => {
            const API_BASE_URL = "http://127.0.0.1:8000";
            const LAST_AUDIT_RESULT_KEY = "lastAuditResult";

            function readAuditUserId() {
                try {
                    const storedUser = JSON.parse(localStorage.getItem("auditUser") || "null");
                    const user = storedUser?.user || storedUser;
                    return user?.account_id || user?.user_id || user?.id || "";
                } catch (error) {
                    return "";
                }
            }

            function setBlockState(message, maxBlockCount = 0) {
                const input = document.getElementById("auditBlockCount");
                const hint = document.getElementById("auditBlockHint");
                if (!input || !hint) {
                    return;
                }

                const max = Number(maxBlockCount) || 0;
                input.disabled = max < 1;
                input.min = "1";
                input.step = "1";
                input.value = max > 0 ? "1" : "";
                if (max > 0) {
                    input.max = String(max);
                } else {
                    input.removeAttribute("max");
                }
                hint.textContent = message;
            }

            function escapeHtml(value) {
                return String(value ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function statusText(status) {
                const statusMap = {
                    complete: "完整",
                    broken: "损坏",
                    missing: "文件丢失",
                    pending: "未审计",
                    no_keyword_match: "未命中索引"
                };
                return statusMap[status] || status || "未知";
            }

            function renderAuditData(data, keyword) {
                const result = document.getElementById("auditResult");
                const resultBody = document.getElementById("auditResultBody");
                if (!result || !resultBody) {
                    return;
                }

                result.innerHTML = `
                    <div><span>文件数</span><strong>${escapeHtml(data.file_count)}</strong></div>
                    <div><span>审计块数</span><strong>${escapeHtml(data.challenge_block_count)}</strong></div>
                    <div><span>审计结果</span><strong>${escapeHtml(statusText(data.audit_result))}</strong></div>
                    <div><span>审计用时</span><strong>${escapeHtml(data.audit_duration || "--")}</strong></div>
                `;

                const rows = data.files || [];
                resultBody.innerHTML = rows.length
                    ? rows.map((file) => `
                        <tr>
                            <td><strong>${escapeHtml(file.file_name)}</strong><br><span>${escapeHtml(file.file_id)}</span></td>
                            <td><span class="keyword-pill">${escapeHtml(keyword)}</span></td>
                            <td><span class="status-pill">${escapeHtml(statusText(file.audit_result))}</span></td>
                            <td>${escapeHtml(data.audit_duration || "--")}</td>
                        </tr>
                    `).join("")
                    : `<tr class="empty-row"><td colspan="4">未命中关键词：${escapeHtml(keyword)}</td></tr>`;
            }

            async function loadLatestAuditRecordInline() {
                const userId = readAuditUserId();
                if (!userId) {
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/home/audit-records?user_id=${encodeURIComponent(userId)}`);
                    const records = await response.json();
                    if (!response.ok || !Array.isArray(records) || !records.length) {
                        return;
                    }

                    const record = records[0];
                    renderAuditData(
                        {
                            file_count: (record.included_files || []).length,
                            challenge_block_count: record.challenge_block_count,
                            audit_result: record.audit_result,
                            audit_duration: record.audit_duration,
                            files: (record.included_files || []).map((file) => ({
                                file_id: file.file_id,
                                file_name: file.file_name,
                                audit_result: file.audit_status
                            }))
                        },
                        record.keyword || ""
                    );
                } catch (error) {
                    // Latest record recovery is best-effort; audit options still controls usability.
                }
            }

            async function loadAuditOptionsInline() {
                const userId = readAuditUserId();
                if (!userId) {
                    setBlockState("请先登录后审计");
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/home/audit/options?user_id=${encodeURIComponent(userId)}`);
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(typeof data.detail === "string" ? data.detail : "安全索引读取失败");
                    }

                    if (!Number(data.max_block_count)) {
                        throw new Error("未读取到安全索引，请先上传文件或检查云端 .index 文件");
                    }

                    setBlockState(`可选范围：1 - ${data.max_block_count}`, data.max_block_count);
                } catch (error) {
                    const message = error.message === "Failed to fetch" ? "无法连接后端服务" : error.message;
                    setBlockState(message);
                    window.alert(message);
                }
            }

            async function runAuditInline(event) {
                event?.preventDefault();
                event?.stopPropagation();

                const userId = readAuditUserId();
                const keywordInput = document.getElementById("auditKeyword");
                const blockInput = document.getElementById("auditBlockCount");
                const button = document.getElementById("runAuditButton");
                const result = document.getElementById("auditResult");
                const resultBody = document.getElementById("auditResultBody");
                const keyword = keywordInput?.value.trim() || "";
                const challengeBlockCount = Number(blockInput?.value || 0);

                if (!userId) {
                    window.alert("请先登录后审计");
                    return;
                }
                if (!keyword) {
                    keywordInput?.focus();
                    return;
                }
                if (!challengeBlockCount) {
                    window.alert("请先选择审计块数");
                    return;
                }

                button.disabled = true;
                button.textContent = "审计中...";
                try {
                    const response = await fetch(`${API_BASE_URL}/home/audit`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            keyword,
                            user_id: userId,
                            challenge_block_count: challengeBlockCount
                        })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(typeof data.detail === "string" ? data.detail : "审计失败");
                    }

                    sessionStorage.setItem(LAST_AUDIT_RESULT_KEY, JSON.stringify({ result: data, keyword }));
                    renderAuditData(data, keyword);
                } catch (error) {
                    const message = error.message === "Failed to fetch" ? "无法连接后端服务" : error.message;
                    window.alert(message);
                } finally {
                    button.disabled = false;
                    button.textContent = "开始审计";
                }
            }

            window.setTimeout(loadAuditOptionsInline, 300);
            window.setTimeout(loadLatestAuditRecordInline, 500);
            window.setTimeout(() => {
                if (!window.__auditExternalScriptLoaded) {
                    document.getElementById("runAuditButton")?.addEventListener("click", (event) => runAuditInline(event));
                }
            }, 800);
        })();
    </script>
</body>
</html>
